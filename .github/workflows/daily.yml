name: 每日更新 AI 新闻 + 部署 Pages

on:
  schedule:
    - cron: '0 7 * * *'   # 每天 UTC 7:00 = 北京时间 15:00
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser lxml

      - name: Fetch AI news
        run: python fetch_news.py

      - name: Commit updated HTML
        run: |
          git config user.name "AI News Bot"
          git config user.email "bot@ai-news.example.com"
          git add index.html news_data.json
          git diff --staged --quiet || git commit -m "auto: 每日 AI 新闻更新 $(date +'%Y-%m-%d')"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
